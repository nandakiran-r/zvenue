appId: com.zvenue.app
name: "Booking Confirmed - Post-Payment Success Screen"
tags:
  - booking
  - confirmed
  - payment
---
# Tests the booking confirmation screen that appears after successful payment.
# Verifies: success icon, "Booking Confirmed!" text, "View Booking" button,
# "Go to Home" button, and navigation from both buttons.
#
# NOTE: This screen is shown as a transparent modal after Razorpay payment succeeds.
# It uses testIDs: "view-booking" and "go-home".
#
# Since we can't easily trigger a real payment in E2E, this test verifies
# the screen elements IF we can navigate to it.

- runFlow: auth_login_flow.yaml

# Navigate to Bookings tab to see existing bookings
- tapOn: "Bookings"
- waitForAnimationToEnd

# Verify bookings screen loaded
- assertVisible: "Venues"
- assertVisible: "Services"

# If there are bookings, tap the first one to view details
- scroll
- waitForAnimationToEnd
