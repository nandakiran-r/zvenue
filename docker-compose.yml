version: '3.8'

services:
  backend:
    build:
      context: ./admin/server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./admin/server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
